# WardenStrike Configuration
# ========================

general:
  project_name: "WardenStrike"
  data_dir: "./data"
  max_threads: 10
  timeout: 30
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  rate_limit: 10  # requests per second
  proxy: null  # http://127.0.0.1:8080 for Burp

# AI Configuration
ai:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  analysis_model: "claude-sonnet-4-20250514"
  report_model: "claude-opus-4-20250514"
  max_tokens: 8192
  temperature: 0.3

# Burp Suite REST API
burpsuite:
  enabled: false
  api_url: "http://127.0.0.1:1337"
  api_key: ""
  proxy_host: "127.0.0.1"
  proxy_port: 8080
  project_file: null
  auto_import: true  # Auto-import findings from Burp
  scan_configs:
    - "Audit checks - all"
    - "Crawl strategy - fastest"

# OWASP ZAP API
zap:
  enabled: false
  api_url: "http://127.0.0.1:8081"
  api_key: ""
  proxy_host: "127.0.0.1"
  proxy_port: 8081

# Recon Configuration
recon:
  subdomain:
    tools: ["subfinder", "amass", "crtsh", "wayback"]
    wordlist: null
    recursive: true
    max_depth: 3
    resolvers: "/usr/share/wordlists/resolvers.txt"

  portscan:
    tool: "nmap"
    ports: "top-1000"
    scan_type: "sV"  # Version detection
    scripts: ["default", "vuln"]
    timing: 4  # T4

  webprobe:
    tool: "httpx"
    threads: 50
    follow_redirects: true
    status_codes: [200, 201, 301, 302, 401, 403, 500]
    tech_detect: true

  crawler:
    tools: ["katana", "gospider", "hakrawler"]
    depth: 3
    js_analysis: true
    scope_strict: true

  fuzzing:
    tool: "ffuf"
    wordlist: "/usr/share/wordlists/dirb/common.txt"
    extensions: [".php", ".asp", ".aspx", ".jsp", ".html", ".js", ".json", ".xml", ".yaml", ".env", ".bak", ".sql", ".conf"]
    threads: 40
    rate_limit: 0
    recursion_depth: 2

# Scanning Configuration
scanner:
  nuclei:
    templates_dir: "~/.local/nuclei-templates"
    severity: ["critical", "high", "medium"]
    rate_limit: 150
    bulk_size: 25
    concurrency: 25
    custom_templates: "./knowledge/nuclei-templates"

  vuln_classes:
    - xss
    - sqli
    - ssrf
    - idor
    - rce
    - lfi
    - open_redirect
    - ssti
    - xxe
    - cors
    - csrf
    - jwt
    - oauth
    - graphql
    - websocket
    - api_abuse
    - race_condition
    - deserialization
    - nosql_injection
    - command_injection
    - path_traversal
    - subdomain_takeover

# Reporting
reporting:
  output_dir: "./reports"
  formats: ["markdown", "html", "json"]
  platform: "hackerone"  # hackerone, bugcrowd, intigriti, immunefi, custom
  auto_cvss: true
  include_remediation: true
  include_references: true
  templates_dir: "./wardenstrike/reporting/templates"

# External API Keys (override via .env file)
api_keys:
  shodan: ""
  censys_id: ""
  censys_secret: ""
  virustotal: ""
  securitytrails: ""
  chaos: ""
  github: ""
  hunter: ""
  fullhunt: ""

# Session Management
session:
  database: "./data/wardenstrike.db"
  auto_save: true
  save_interval: 60  # seconds
  max_sessions: 100

# Notification
notifications:
  enabled: false
  slack_webhook: ""
  discord_webhook: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

# ─── OSINT Configuration ──────────────────────────────────────────────────────
osint:
  shodan_api_key: ""        # Override with SHODAN_API_KEY env var
  censys_api_id: ""
  censys_api_secret: ""
  github_token: ""          # Override with GITHUB_TOKEN env var
  hibp_api_key: ""          # Have I Been Pwned API key
  virustotal_api_key: ""
  fullhunt_api_key: ""
  hunter_api_key: ""

# ─── Active Directory Configuration ──────────────────────────────────────────
active_directory:
  default_domain: ""
  default_dc_ip: ""
  bloodhound_output_dir: "/tmp/wardenstrike_bloodhound"
  impacket_timeout: 60
  max_spray_attempts: 2     # Stay safe: never exceed lockout threshold - 1

# ─── Cloud Configuration ─────────────────────────────────────────────────────
cloud:
  aws:
    default_profile: "default"
    default_region: "us-east-1"
    check_all_regions: false  # Set true for full multi-region audit
  gcp:
    default_project: ""
  azure:
    default_subscription: ""

# ─── Metasploit MSFRPC ───────────────────────────────────────────────────────
metasploit:
  host: "127.0.0.1"
  port: 55553
  password: "msfrpc_password"    # Change this! Start: msfrpcd -P <password> -S -a 127.0.0.1
  ssl: true
  auto_correlate: false          # Auto-correlate findings with MSF modules after scan

# ─── Nessus / Tenable ────────────────────────────────────────────────────────
nessus:
  url: "https://localhost:8834"
  access_key: ""               # Preferred auth (API keys)
  secret_key: ""
  username: ""                 # Alternative: username/password auth
  password: ""
  auto_import: false           # Auto-import completed scans

# ─── Continuous Monitor ───────────────────────────────────────────────────────
monitor:
  db_path: "~/.wardenstrike/monitor.db"
  check_interval_hours: 4       # How often to run (for cron guidance)
  alert_new_subdomains: true
  alert_new_ports: true
  alert_content_changes: true
  alert_cert_changes: true
  alert_tech_changes: false
  risky_ports: [22, 23, 25, 3306, 3389, 5432, 6379, 9200, 27017, 445, 2375]

# ─── Web3 Configuration ──────────────────────────────────────────────────────
web3:
  rpc_url: ""                  # Ethereum RPC (e.g. Infura/Alchemy)
  etherscan_api_key: ""
  foundry_profile: "default"
  slither_args: "--print human-summary"
  mythril_timeout: 300

# ─── GraphQL Configuration ────────────────────────────────────────────────────
graphql:
  introspection_check: true
  batch_check: true
  depth_limit_check: true
  auth_bypass_check: true
  injection_check: true
  max_depth_test: 8

# ─── JWT Configuration ────────────────────────────────────────────────────────
jwt:
  brute_force_enabled: true
  brute_force_wordlist: ""     # Path to custom wordlist (uses built-in if empty)
  test_alg_none: true
  test_rsa_confusion: true
  test_kid_injection: true
